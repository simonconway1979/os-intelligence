<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OS-Intelligence — OG card (2400×1260, exports to 1200×630 @2x)</title>
<!--
  Social share card. The .card below is a genuine 2400×1260 (2× of the 1200×630 OG size).
  To export og-image.png:
    1. Open this file in Chrome (it renders huge — that's correct, it's 2400px wide).
    2. DevTools (Cmd+Opt+I) → Elements tab → right-click the <div class="card"> node
       → "Capture node screenshot". You get a crisp 2400×1260 PNG.
    3. Save it over docs/og-image.png  →  served at https://os-intelligence.ai/og-image.png
    4. Re-run the LinkedIn Post Inspector after deploy (add ?v=2 to the URL there to bust its cache).
  Everything below is sized in CSS px at 2×; to halve it, divide every px value by 2.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box }
  html,body{ background:#05101f; display:flex; align-items:flex-start; justify-content:flex-start; min-height:100vh; font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif }

  .card{
    width:2400px; height:1260px; position:relative; overflow:hidden;
    background:
      radial-gradient(1800px 1000px at 78% 18%, rgba(29,122,252,.28), transparent 60%),
      radial-gradient(1400px 1200px at 12% 95%, rgba(96,198,210,.14), transparent 60%),
      linear-gradient(150deg, #0a1f3d 0%, #091e42 45%, #07172f 100%);
    color:#fff; padding:144px 160px; display:flex; flex-direction:column; justify-content:space-between;
  }

  /* subtle grid texture */
  .card::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:96px 96px; mask-image:linear-gradient(to bottom, rgba(0,0,0,.6), transparent 70%);
  }
  .card > *{ position:relative; z-index:1 }

  /* top row: terminal chrome + repo */
  .top{ display:flex; align-items:center; gap:28px }
  .dots{ display:flex; gap:16px }
  .dots span{ width:26px; height:26px; border-radius:50% }
  .dots span:nth-child(1){ background:#F87168 }
  .dots span:nth-child(2){ background:#F5CD47 }
  .dots span:nth-child(3){ background:#4BCE97 }
  .repo{ font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; font-size:40px; color:#7e93b3; letter-spacing:.02em }

  /* middle: wordmark + tagline */
  .mid{ display:flex; flex-direction:column; gap:48px }
  .wordmark{ font-size:192px; font-weight:800; letter-spacing:-.02em; line-height:1 }
  .wordmark .os{ color:#fff }
  .wordmark .intel{ color:#579DFF }
  .tagline{ font-size:60px; font-weight:500; color:#c5d3ea; line-height:1.3; max-width:2080px }
  .tagline b{ color:#fff; font-weight:700 }
  .tagline .t1{ white-space:nowrap }

  /* bottom: command line + url */
  .bottom{ display:flex; align-items:flex-end; justify-content:space-between; gap:48px }
  .cmd{ font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; font-size:48px; color:#9fb3d1 }
  .cmd .prompt{ color:#4BCE97 }
  .cmd .cc{ color:#579DFF }
  .url{ font-size:48px; font-weight:600; color:#fff; display:flex; align-items:center; gap:28px; white-space:nowrap }
  .url .badge{ font-size:32px; font-weight:600; color:#a9c2ea; background:rgba(87,157,255,.16); border:2px solid rgba(87,157,255,.32); padding:12px 24px; border-radius:999px }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="repo">os-intelligence</div>
    </div>

    <div class="mid">
      <div class="wordmark"><span class="os">OS-</span><span class="intel">Intelligence</span></div>
      <div class="tagline"><span class="t1">A reasoning layer for <b>AI-native product managers</b>.</span><br>Built in Claude Code. Every session compounds.</div>
    </div>

    <div class="bottom">
      <div class="cmd"><span class="prompt">$</span> <span class="cc">claude</span> &nbsp;›&nbsp; <span class="cc">/os-welcome</span></div>
      <div class="url">os-intelligence.ai <span class="badge">free &amp; open source</span></div>
    </div>
  </div>
</body>
</html>
